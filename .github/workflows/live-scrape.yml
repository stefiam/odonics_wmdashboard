name: Live Match Updater

on:
  schedule:
    - cron: '*/5 * * * *'   # alle 5 Minuten
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  live-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Check if match is currently live
        id: check
        run: |
          IS_LIVE=$(node -e "
            const fs = require('fs');
            try {
              const d = JSON.parse(fs.readFileSync('public/data/kicktipp.json', 'utf8'));
              const now = Date.now();
              const live = (d.matches || []).some(m => {
                if (!m.date) return false;
                const start = new Date(m.date).getTime();
                return now >= start && now <= start + 115 * 60 * 1000;
              });
              console.log(live ? 'true' : 'false');
            } catch(e) { console.log('false'); }
          ")
          echo "is_live=$IS_LIVE" >> \$GITHUB_OUTPUT
          echo "Live match detected: $IS_LIVE"

      - name: Setup Node.js
        if: steps.check.outputs.is_live == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        if: steps.check.outputs.is_live == 'true'
        run: npm ci

      - name: Install scraper dependencies
        if: steps.check.outputs.is_live == 'true'
        run: cd scraper && npm ci

      - name: Cache Playwright Chromium
        if: steps.check.outputs.is_live == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('scraper/package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.check.outputs.is_live == 'true'
        run: cd scraper && npx playwright install chromium --with-deps

      - name: Run scraper
        if: steps.check.outputs.is_live == 'true'
        env:
          KICKTIPP_USER: ${{ secrets.KICKTIPP_USER }}
          KICKTIPP_PASS: ${{ secrets.KICKTIPP_PASS }}
          KICKTIPP_COMMUNITY: ${{ secrets.KICKTIPP_COMMUNITY }}
        run: cd scraper && node scrape.js

      - name: Commit updated data
        if: steps.check.outputs.is_live == 'true'
        run: |
          git config user.name "WM Dashboard Bot"
          git config user.email "bot@wm2026-dashboard"
          git add public/data/kicktipp.json
          git diff --staged --quiet || git commit -m "chore: live update [$(date -u '+%H:%M UTC')]"
          git push

      - name: Build dashboard
        if: steps.check.outputs.is_live == 'true'
        env:
          VITE_FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: npm run build

      - name: Deploy to GitHub Pages
        if: steps.check.outputs.is_live == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
