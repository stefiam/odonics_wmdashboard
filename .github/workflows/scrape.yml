name: Kicktipp Scraper + Deploy

on:
  schedule:
    # 08:00, 16:00, 23:00 CEST (= 06:00, 14:00, 21:00 UTC)
    # nach den typischen WM-Spielzeiten 18:00, 21:00 und 00:00 CEST
    - cron: '0 6,14,21 * * *'
  workflow_dispatch: # manueller Start möglich
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: wm-deploy   # serialisiert mit live-scrape.yml (kein paralleler push/deploy)
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install scraper dependencies
        run: cd scraper && npm ci

      - name: Install Playwright Chromium
        run: cd scraper && npx playwright install chromium --with-deps

      - name: Run scraper
        env:
          KICKTIPP_USER: ${{ secrets.KICKTIPP_USER }}
          KICKTIPP_PASS: ${{ secrets.KICKTIPP_PASS }}
          KICKTIPP_COMMUNITY: ${{ secrets.KICKTIPP_COMMUNITY }}
        run: cd scraper && node scrape.js

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug
          path: scraper/*.png
          if-no-files-found: ignore

      - name: Commit updated data
        run: |
          git config user.name "WM Dashboard Bot"
          git config user.email "bot@wm2026-dashboard"
          git add public/data/kicktipp.json
          git diff --staged --quiet || git commit -m "chore: update kicktipp data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git pull --rebase --autostash origin main
          git push

      - name: Build dashboard
        env:
          VITE_FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: ''  # optional: eigene Domain eintragen
