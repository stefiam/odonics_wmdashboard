name: Kicktipp Scraper + Deploy

on:
  schedule:
    # 8:00 und 20:00 UTC täglich (= 10:00 und 22:00 CEST)
    - cron: '0 8,20 * * *'
  workflow_dispatch: # manueller Start möglich

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install scraper dependencies
        run: cd scraper && npm ci

      - name: Install Playwright Chromium
        run: cd scraper && npx playwright install chromium --with-deps

      - name: Run scraper
        env:
          KICKTIPP_USER: ${{ secrets.KICKTIPP_USER }}
          KICKTIPP_PASS: ${{ secrets.KICKTIPP_PASS }}
          KICKTIPP_COMMUNITY: ${{ secrets.KICKTIPP_COMMUNITY }}
        run: cd scraper && node scrape.js

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug
          path: scraper/*.png
          if-no-files-found: ignore

      - name: Commit updated data
        run: |
          git config user.name "WM Dashboard Bot"
          git config user.email "bot@wm2026-dashboard"
          git add public/data/kicktipp.json
          git diff --staged --quiet || git commit -m "chore: update kicktipp data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Build dashboard
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: ''  # optional: eigene Domain eintragen
